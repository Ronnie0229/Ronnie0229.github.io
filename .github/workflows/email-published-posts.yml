name: Email published posts

on:
  push:
    branches:
      - main
    paths:
      - "src/content/posts/**.md"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Comma-separated post slug(s) to notify"
        required: true
        type: string
      check_only:
        description: "Only resolve slugs and check D1 duplicate records; do not send"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: email-published-posts
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Wait for deployment and send email
        env:
          SITE_URL: https://ronniecross.com
          EMAIL_AUTOMATION_SECRET: ${{ secrets.EMAIL_AUTOMATION_SECRET }}
          MANUAL_POST_SLUGS: ${{ inputs.slugs }}
          EMAIL_CHECK_ONLY: ${{ inputs.check_only }}
        run: node scripts/notify-deployed-posts.mjs
