<!doctype html>
<html lang="zh-CN" data-theme="dark" data-theme-mode="system">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" id="theme-color" content="#061625">
    <script>
      (() => {
        const key = "ronniecross-theme";
        let saved = null;
        try {
          const value = localStorage.getItem(key);
          saved = value === "dark" || value === "light" ? value : null;
        } catch {}
        const theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.themeMode = saved ? "manual" : "system";
        document.querySelector("#theme-color")?.setAttribute("content", theme === "dark" ? "#061625" : "#f7f9fc");
      })();
    </script>
    <title>网站管理 | Ronnie</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/admin/admin.css?v=admin-nav-responsive-1">
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">RONNIECROSS</p>
          <h1>网站管理</h1>
          <p>选择要处理的内容。文章发布后会写入 GitHub，留言操作会直接更新网站数据库。</p>
        </div>
        <nav class="admin-nav" aria-label="管理导航">
          <a href="/admin/editor.html">文章管理</a>
          <a href="/admin/comments.html">留言管理</a>
          <a href="/admin/stats.html">数据概览</a>
          <a href="/admin/subscribers.html">邮件订阅</a>
          <a href="/">返回网站</a>
        </nav>
      </header>

      <section class="admin-grid" aria-label="后台功能">
        <a class="admin-card" href="/admin/editor.html">
          <span class="admin-card-icon" aria-hidden="true">文</span>
          <div>
            <h2>文章管理</h2>
            <p>新增、修改、保存草稿和发布文章，也可以上传文章图片。</p>
          </div>
        </a>
        <a class="admin-card" href="/admin/comments.html">
          <span class="admin-card-icon" aria-hidden="true">言</span>
          <div>
            <h2>留言管理</h2>
            <p>查看、搜索、隐藏、恢复或永久删除游客留言和回复。</p>
          </div>
        </a>
        <a class="admin-card" href="/admin/stats.html">
          <span class="admin-card-icon" aria-hidden="true">数</span>
          <div>
            <h2>数据概览</h2>
            <p>查看热门文章、累计阅读、待审核留言和近 30 天趋势。</p>
          </div>
        </a>
        <a class="admin-card" href="/admin/subscribers.html">
          <span class="admin-card-icon" aria-hidden="true">邮</span>
          <div>
            <h2>邮件订阅</h2>
            <p>只读查看订阅邮箱、确认状态和最近发送时间。</p>
          </div>
        </a>
      </section>
    </main>
    <script src="/admin/theme.js?v=ui-pagination-fix-1"></script>
  </body>
</html>
