<!doctype html>
<html lang="zh-CN">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>网站管理 | Ronnie</title>
    <link rel="stylesheet" href="/admin/admin.css?v=20260612-6">
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">RONNIECROSS</p>
          <h1>网站管理</h1>
          <p>选择要处理的内容。文章发布后会写入 GitHub，留言操作会直接更新网站数据库。</p>
        </div>
        <nav class="admin-nav" aria-label="管理导航">
          <a href="/admin/editor.html">文章管理</a>
          <a href="/admin/comments.html">留言管理</a>

      <section class="admin-grid" aria-label="后台功能">
        <a class="admin-card" href="/admin/editor.html">
          <span class="admin-card-icon" aria-hidden="true">文</span>
          <div>
            <h2>文章管理</h2>
            <p>新增、修改、保存草稿和发布文章，也可以上传文章图片。</p>
          </div>
        </a>
        <a class="admin-card" href="/admin/comments.html">
          <span class="admin-card-icon" aria-hidden="true">言</span>
          <div>
            <h2>留言管理</h2>
            <p>查看、搜索、隐藏、恢复或永久删除游客留言和回复。</p>
          </div>
        </a>
      </section>
