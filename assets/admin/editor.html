<!doctype html>
<html lang="zh-CN" data-theme="dark" data-theme-mode="system">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" id="theme-color" content="#061625">
    <script>
      (() => {
        const key = "ronniecross-theme";
        let saved = null;
        try {
          const value = localStorage.getItem(key);
          saved = value === "dark" || value === "light" ? value : null;
        } catch {}
        const theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.themeMode = saved ? "manual" : "system";
        document.querySelector("#theme-color")?.setAttribute("content", theme === "dark" ? "#061625" : "#f7f9fc");
      })();
    </script>
    <title>文章管理 | Ronnie</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/admin/admin.css?v=stats-mobile-1">
  </head>
  <body>
    <main class="admin-shell editor-shell">
      <header class="admin-header compact">
        <div>
          <p class="admin-eyebrow">文章管理</p>
          <h1>文章与草稿</h1>
          <p>在手机或电脑上新建、修改和发布文章。</p>
        </div>
        <nav class="admin-nav" aria-label="管理导航">
          <a href="/admin/">管理首页</a>
          <a href="/admin/comments.html">留言管理</a>
          <a href="/admin/subscribers.html">邮件订阅</a>
          <a href="/">返回网站</a>
        </nav>
      </header>

      <section class="auth-panel" data-auth-panel>
        <h2>连接 GitHub</h2>
        <p>文章保存在 GitHub。连接成功后才能读取和保存文章。</p>
        <a class="primary-button" href="/admin/api/auth">连接 GitHub</a>
      </section>

      <section class="article-manager" data-manager hidden>
        <div class="article-toolbar">
          <label class="article-search">
            <span class="sr-only">搜索文章</span>
            <input type="search" placeholder="搜索标题或经文" data-search>
          </label>
          <label>
            <span class="sr-only">筛选文章</span>
            <select data-filter>
              <option value="all">全部文章</option>
              <option value="教会讲道">教会讲道</option>
              <option value="灵命成长">灵命成长</option>
              <option value="draft">草稿</option>
            </select>
          </label>
          <button class="primary-button" type="button" data-new>新建文章</button>
        </div>

        <div
          class="admin-operation-status"
          data-operation-status
          aria-live="assertive"
          hidden
        ></div>
        <div class="admin-status" data-list-status aria-live="polite">
          正在读取文章...
        </div>
        <nav class="article-pagination article-pagination-top" data-pagination aria-label="文章列表顶部分页"></nav>
        <section class="article-list" data-article-list></section>
        <nav class="article-pagination" data-pagination aria-label="文章列表底部分页"></nav>
      </section>

      <section class="article-editor" data-editor hidden>
        <div class="editor-heading">
          <button class="text-button" type="button" data-back>返回文章列表</button>
          <div>
            <p class="admin-eyebrow" data-editor-mode>新建文章</p>
            <h2 data-editor-title>填写文章内容</h2>
            <p class="revision-meta" data-revision-meta hidden></p>
          </div>
            <details class="more-menu" data-more-menu>
              <summary>更多</summary>
              <div>
                <a href="/admin/decap.html">打开备用编辑器</a>
              </div>
            </details>
        </div>

        <form data-article-form>
          <section class="editor-section">
            <h3>基本信息</h3>
            <div class="editor-fields two-columns">
              <label class="field-wide">
                <span>文章标题</span>
                <input name="title" required placeholder="输入清楚、完整的标题">
              </label>
              <label>
                <span>发布日期</span>
                <input name="date" type="date" required>
              </label>
              <label>
                <span>文章分类</span>
                <select name="category">
                  <option value="灵命成长">灵命成长</option>
                  <option value="教会讲道">教会讲道</option>
                </select>
              </label>
              <label class="field-wide">
                <span>圣经经文</span>
                <input name="scripture" placeholder="例如：罗马书 8:1-11">
              </label>
            </div>
          </section>

          <section class="editor-section content-section">
            <div class="section-heading">
              <h3>文章内容</h3>
              <div class="segmented-control" role="group" aria-label="内容显示方式">
                <button class="active" type="button" data-view="edit">编辑</button>
                <button type="button" data-view="preview">预览</button>
              </div>
            </div>
            <div class="compact-toolbar" aria-label="正文工具">
              <button type="button" data-insert="## ">标题</button>
              <button type="button" data-wrap="**">粗体</button>
              <button type="button" data-insert="> ">引用</button>
              <button type="button" data-link>链接</button>
              <button type="button" data-image>上传图片</button>
              <button type="button" data-image-library>图片库</button>
              <input type="file" accept="image/*" data-image-input hidden>
            </div>
            <textarea
              class="body-editor"
              name="body"
              placeholder="从这里开始写正文..."
              data-body
            ></textarea>
            <article class="body-preview" data-preview hidden></article>
          </section>

          <details class="editor-section advanced-section">
            <summary>摘要与其他设置</summary>
            <div class="editor-fields two-columns advanced-fields">
              <label class="field-wide">
                <span>内容摘要</span>
                <textarea name="description" rows="4" placeholder="用于文章列表的简短介绍"></textarea>
              </label>
              <label class="field-wide">
                <span>标签</span>
                <input name="tags" placeholder="多个标签用逗号分隔">
              </label>
              <div class="tag-helper field-wide" aria-label="常用标签">
                <span>常用标签</span>
                <div class="tag-presets" data-tag-presets></div>
              </div>
              <label>
                <span>作者</span>
                <input name="author" value="Ronnie">
              </label>
              <label>
                <span>原始资料</span>
                <input name="source">
              </label>
              <label class="check-field">
                <input name="reviewed" type="checkbox">
                <span>已经人工复核</span>
              </label>
            </div>
          </details>

          <p class="editor-backup-status" data-backup-status aria-live="polite"></p>
          <div class="editor-message" data-editor-message aria-live="polite"></div>
          <div class="editor-actions">
            <button class="danger-button" type="button" data-delete hidden>
              删除文章
            </button>
            <button class="secondary-button" type="button" data-cancel>取消</button>
            <button class="secondary-button" type="button" data-save-draft>
              保存草稿
            </button>
            <button class="primary-button" type="submit">发布文章</button>
          </div>
        </form>
      </section>
    </main>
    <dialog class="image-library" data-image-dialog>
      <div class="image-library-heading">
        <div>
          <p class="admin-eyebrow">图片管理</p>
          <h2>选择已上传图片</h2>
        </div>
        <button class="secondary-button" type="button" data-image-close>关闭</button>
      </div>
      <p class="admin-status" data-image-status>正在读取图片...</p>
      <div class="image-library-grid" data-image-grid></div>
    </dialog>
    <script src="/admin/theme.js?v=phase8-2"></script>
    <script src="/admin/auto-email.js?v=1"></script>
    <script src="/admin/editor.js?v=20260614-1"></script>
  </body>
</html>
