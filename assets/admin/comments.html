<!doctype html>
<html lang="zh-CN" data-theme="dark" data-theme-mode="system">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <meta name="theme-color" id="theme-color" content="#061625">
    <script>
      (() => {
        const key = "ronniecross-theme";
        let saved = null;
        try {
          const value = localStorage.getItem(key);
          saved = value === "dark" || value === "light" ? value : null;
        } catch {}
        const theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.themeMode = saved ? "manual" : "system";
        document.querySelector("#theme-color")?.setAttribute("content", theme === "dark" ? "#061625" : "#f7f9fc");
      })();
    </script>
    <title>留言管理 | Ronnie</title>
    <link rel="stylesheet" href="/styles/tokens.css">
    <link rel="stylesheet" href="/admin/admin.css?v=stats-mobile-1">
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header compact">
        <div>
          <p class="admin-eyebrow">留言管理</p>
          <h1>游客留言</h1>
          <p>隐藏或恢复会同时处理该留言下的回复。永久删除无法撤销。</p>
        </div>
        <nav class="admin-nav">
          <a href="/admin/">管理首页</a>
          <a href="/admin/editor.html">文章管理</a>
          <a href="/admin/stats.html">数据概览</a>
          <a href="/">返回网站</a>
        </nav>
      </header>

      <form class="comment-toolbar" data-filter-form>
        <label>
          <span>搜索</span>
          <input type="search" name="q" placeholder="昵称、内容或文章地址">
        </label>
        <label>
          <span>状态</span>
          <select name="status">
            <option value="all">全部</option>
            <option value="visible">公开</option>
            <option value="hidden">已隐藏</option>
          </select>
        </label>
        <button type="submit">查询</button>
      </form>

      <div class="admin-status" data-status aria-live="polite">正在读取留言...</div>
      <section class="admin-comments" data-comment-list></section>
      <nav class="admin-pagination" aria-label="留言分页">
        <button type="button" data-previous disabled>上一页</button>
        <span data-page>第 1 页</span>
        <button type="button" data-next disabled>下一页</button>
      </nav>
    </main>
    <script src="/admin/theme.js?v=phase8-2"></script>
    <script src="/admin/comments.js"></script>
  </body>
</html>
